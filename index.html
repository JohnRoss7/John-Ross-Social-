
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>John Ross Social</title>
<meta property="og:title" content="John Ross Social">
<meta property="og:description" content="Your space. Your voice. Free expression.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://johnross7.github.io/John-Ross-Social-/">
<meta property="og:image" content="https://johnross7.github.io/John-Ross-Social-/preview.jpg">
<meta name="twitter:card" content="summary_large_image">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#000;color:#fff;min-height:100vh}
.app{max-width:600px;margin:0 auto;min-height:100vh;padding-bottom:70px}
.hdr{position:sticky;top:0;background:#000;border-bottom:1px solid #333;padding:10px 16px;z-index:100;display:flex;align-items:center;justify-content:space-between}
.logo{background:#dc2626;color:#fff;padding:6px 12px;border-radius:16px;font-weight:700;font-size:13px}
.slogan{color:#dc2626;font-size:10px;font-style:italic;margin-left:8px;flex:1}
.lb{background:#333;color:#fff;border:none;padding:4px 10px;border-radius:12px;font-size:11px;cursor:pointer}
.post{border-bottom:1px solid #333;padding:12px}
.post-hdr{display:flex;gap:8px;margin-bottom:6px}
.av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#dc2626,#7c2d12);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}
.av-lg{width:80px;height:80px;font-size:28px}
.pn{font-weight:700;font-size:13px}
.ph{color:#999;font-size:11px}
.pc{font-size:14px;line-height:1.4;margin:6px 0;word-wrap:break-word}
.act{display:flex;gap:24px;margin-top:6px;color:#999;font-size:14px}
.ac{display:flex;align-items:center;gap:6px;cursor:pointer}
.heart{color:#dc2626;font-size:18px}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
.ha{animation:pop .3s}
.nav{position:fixed;bottom:0;left:0;right:0;background:#000;border-top:1px solid #333;display:flex;justify-content:space-around;padding:6px 0;max-width:600px;margin:0 auto;z-index:100}
.ni{background:none;border:none;color:#999;padding:6px 14px;font-size:22px;cursor:pointer}
.ni.act{color:#dc2626}
.btn{background:#dc2626;color:#fff;border:none;padding:10px 18px;border-radius:20px;font-weight:600;cursor:pointer;font-size:14px}
.btn-o{background:transparent;border:1px solid #444;color:#fff}
.inp{width:100%;background:#1a1a1a;border:1px solid #333;color:#fff;padding:10px 14px;border-radius:20px;margin:4px 0;font-size:14px}
textarea.inp{border-radius:12px;min-height:80px;resize:vertical}
.cm{padding:8px 0;border-bottom:1px solid #333}
.cu{font-weight:700;font-size:12px}
.cc{font-size:13px;margin-top:2px}
.ctr{text-align:center;padding:40px 20px;color:#666}
.admin-badge{background:#dc2626;color:#fff;padding:2px 6px;border-radius:8px;font-size:10px;margin-left:6px;vertical-align:middle}
.post-actions{position:relative;display:inline-block;float:right}
.menu-dots{background:none;border:none;color:#999;font-size:22px;cursor:pointer;padding:0 6px;line-height:1}
.post-menu{background:#333;border:1px solid #555;border-radius:8px;padding:4px 0;position:absolute;right:0;top:24px;z-index:50;min-width:100px;display:none}
.post-menu.show{display:block}
.post-menu button{background:none;border:none;color:#fff;padding:8px 12px;width:100%;text-align:left;cursor:pointer;font-size:13px}
.post-menu button:hover{background:#dc2626}
</style>
</head>
<body>
<div class="app">
<div class="hdr">
<div style="display:flex;align-items:center;flex:1">
<div class="logo">John Ross Social</div>
<div class="slogan">Your space. Your voice.</div>
</div>
<button class="lb" onclick="toggleLang()">EL</button>
</div>
<div id="main"></div>
<div class="nav">
<button class="ni act" data-tab="home" onclick="showTab('home')">🏠</button>
<button class="ni" data-tab="search" onclick="showTab('search')">🔍</button>
<button class="ni" data-tab="notif" onclick="showTab('notif')">🔔</button>
<button class="ni" data-tab="profile" onclick="showTab('profile')">👤</button>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyCPIg-aoWUhqOqO5hyHUd66HLcHPyC6e70",
  authDomain: "studio-386569156-384ec.firebaseapp.com",
  projectId: "studio-386569156-384ec",
  storageBucket: "studio-386569156-384ec.firebasestorage.app",
  messagingSenderId: "976658898078",
  appId: "1:976658898078:web:6209be10508924e2116f8f"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let user = null;
let tab = 'home';
let lang = 'en';
const adminEmails = ['rossrossg7@gmail.com'];

const T = {
en:{slogan:'Your space. Your voice.',hello:'Hello',login:'Login',register:'Register',email:'Email',password:'Password',google:'Google',logout:'Logout',post:'Post',placeholder:"What's on your mind?",like:'Like',comment:'Comment',noPosts:'No posts yet',noNotifs:'No notifications',search:'Search',profile:'Profile',bio:'Bio',save:'Save',followers:'followers',following:'following',delete:'Delete',follow:'Follow',unfollow:'Unfollow'},
el:{slogan:'Ο χώρος σου. Η φωνή σου.',hello:'Γειά σου',login:'Σύνδεση',register:'Εγγραφή',email:'Email',password:'Κωδικός',google:'Google',logout:'Αποσύνδεση',post:'Δημοσίευση',placeholder:"Τι σκέφτεσαι;",like:'Μου αρέσει',comment:'Σχόλιο',noPosts:'Δεν υπάρχουν δημοσιεύσεις',noNotifs:'Δεν υπάρχουν ειδοποιήσεις',search:'Αναζήτηση',profile:'Προφίλ',bio:'Βιογραφικό',save:'Αποθήκευση',followers:'ακόλουθοι',following:'ακολουθείς',delete:'Διαγραφή',follow:'Ακολούθηση',unfollow:'Ακολουθείς'}
};
function t(k){return T[lang][k]||k}
function isAdmin(email){return adminEmails.includes(email)}

function toggleLang(){
  lang = lang==='en'?'el':'en';
  document.querySelector('.slogan').textContent = t('slogan');
  document.querySelector('.lb').textContent = lang==='en'?'EL':'EN';
  render();
}

function showTab(name){
  tab = name;
  document.querySelectorAll('.ni').forEach(b=>b.classList.toggle('act',b.dataset.tab===name));
  render();
}

auth.onAuthStateChanged(u=>{user = u; render();});

function login(){
  const e = document.getElementById('le').value;
  const p = document.getElementById('lp').value;
  auth.signInWithEmailAndPassword(e,p).catch(err=>alert(err.message));
}

function register(){
  const e = document.getElementById('le').value;
  const p = document.getElementById('lp').value;
  if(!e||!p) return alert('Συμπλήρωσε email και κωδικό');
  auth.createUserWithEmailAndPassword(e,p).then(cred=>{
    return db.collection('users').doc(cred.user.uid).set({
      email:e,name:e.split('@')[0],bio:'',followers:[],following:[],createdAt:Date.now()
    });
  }).catch(err=>alert(err.message));
}

function googleLogin(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).then(cred=>{
    return db.collection('users').doc(cred.user.uid).set({
      email:cred.user.email,
      name:cred.user.displayName||cred.user.email.split('@')[0],
      bio:'',followers:[],following:[],createdAt:Date.now()
    },{merge:true});
  }).catch(err=>alert(err.message));
}

function logout(){auth.signOut()}

function postContent(){
  const ta = document.getElementById('postText');
  if(!ta.value.trim()) return;
  db.collection('posts').add({
    uid:user.uid,
    name:user.email.split('@')[0],
    email:user.email,
    text:ta.value,likes:0,comments:[],
    createdAt:Date.now()
  });
  ta.value='';
}

function likePost(id){
  db.collection('posts').doc(id).update({likes:firebase.firestore.FieldValue.increment(1)});
}

function addComment(id){
  const inp = document.getElementById('c_'+id);
  if(!inp.value.trim()) return;
  db.collection('posts').doc(id).update({
    comments:firebase.firestore.FieldValue.arrayUnion({
      name:user.email.split('@')[0],email:user.email,text:inp.value,time:Date.now()
    })
  });
  inp.value='';
}

function deletePost(id){
  if(!confirm(t('delete')+'?')) return;
  db.collection('posts').doc(id).delete();
}

function toggleMenu(id){
  const menu = document.getElementById('menu_'+id);
  if(menu) menu.classList.toggle('show');
}

function toggleFollow(targetUid){
  const myRef = db.collection('users').doc(user.uid);
  const theirRef = db.collection('users').doc(targetUid);
  myRef.get().then(doc=>{
    const following = doc.data().following||[];
    if(following.includes(targetUid)){
      myRef.update({following:firebase.firestore.FieldValue.arrayRemove(targetUid)});
      theirRef.update({followers:firebase.firestore.FieldValue.arrayRemove(user.uid)});
    } else {
      myRef.update({following:firebase.firestore.FieldValue.arrayUnion(targetUid)});
      theirRef.update({followers:firebase.firestore.FieldValue.arrayUnion(user.uid)});
    }
  });
}

function render(){
  const m = document.getElementById('main');
  if(!user){
    m.innerHTML = `
      <div style="text-align:center;padding:60px 20px">
        <div style="font-size:50px;margin-bottom:20px">👋</div>
        <h2 style="margin-bottom:8px">John Ross Social</h2>
        <p style="color:#999;margin-bottom:30px">${t('slogan')}</p>
        <input class="inp" id="le" placeholder="${t('email')}" type="email">
        <input class="inp" id="lp" placeholder="${t('password')}" type="password">
        <button class="btn" onclick="login()" style="width:100%;margin:10px 0">${t('login')}</button>
        <button class="btn btn-o" onclick="register()" style="width:100%;margin-bottom:10px">${t('register')}</button>
        <button class="btn btn-o" onclick="googleLogin()" style="width:100%">${t('google')}</button>
      </div>`;
    return;
  }
  if(tab==='home') renderHome(m);
  else if(tab==='search') renderSearch(m);
  else if(tab==='notif') renderNotifs(m);
  else if(tab==='profile') renderProfile(m);
}

function renderHome(m){
  m.innerHTML = `
    <div class="post">
      <textarea class="inp" id="postText" placeholder="${t('placeholder')}"></textarea>
      <button class="btn" onclick="postContent()" style="margin-top:8px">${t('post')}</button>
    </div>
    <div id="feed">${t('noPosts')}</div>`;
  db.collection('posts').orderBy('createdAt','desc').limit(50).onSnapshot(snap=>{
    const f = document.getElementById('feed');
    if(!f) return;
    if(snap.empty){f.innerHTML='<div class="ctr">'+t('noPosts')+'</div>';return}
    f.innerHTML = snap.docs.map(d=>{
      const p = d.data();
      const postId = d.id;
      const isPostAdmin = isAdmin(p.email);
      const adminBadge = isPostAdmin ? '<span class="admin-badge">👑 Admin</span>' : '';
      const canDelete = (user.uid === p.uid) || isAdmin(user.email);
      const comments = (p.comments||[]).map(c=>`<div class="cm"><div><div class="cu">${c.name}</div><div class="cc">${c.text}</div></div></div>`).join('');
      return `<div class="post">
        <div class="post-hdr">
          <div class="av">${(p.name||'?')[0].toUpperCase()}</div>
          <div style="flex:1">
            <div class="pn">${p.name||'User'}${adminBadge}</div>
            <div class="ph">${new Date(p.createdAt).toLocaleString()}</div>
          </div>
          ${canDelete ? `<div class="post-actions"><button class="menu-dots" onclick="toggleMenu('${postId}')">⋯</button><div class="post-menu" id="menu_${postId}"><button onclick="deletePost('${postId}')">${t('delete')}</button></div></div>` : ''}
        </div>
        <div class="pc">${p.text}</div>
        <div class="act">
          <span class="ac" onclick="likePost('${postId}')">❤️ <span class="heart">${p.likes||0}</span></span>
          <span class="ac">💬 ${(p.comments||[]).length}</span>
        </div>
        ${comments}
        <div style="display:flex;gap:6px;margin-top:8px">
          <input class="inp" id="c_${postId}" placeholder="${t('comment')}" style="margin:0">
          <button class="btn" onclick="addComment('${postId}')" style="padding:8px 14px">↩</button>
        </div>
      </div>`;
    }).join('');
    document.addEventListener('click', function(e) {
      document.querySelectorAll('.post-menu.show').forEach(m => m.classList.remove('show'));
    });
  });
}

function renderSearch(m){
  m.innerHTML = `<div style="padding:12px"><input class="inp" placeholder="${t('search')}" oninput="searchUsers(this.value)"><div id="searchRes"></div></div>`;
}

function searchUsers(q){
  const out = document.getElementById('searchRes');
  if(!q){out.innerHTML='';return}
  db.collection('users').where('name','>=',q).where('name','<=',q+'\uf8ff').limit(20).get().then(snap=>{
    out.innerHTML = snap.docs.map(d=>{
      const u = d.data();
      const isPostAdmin = isAdmin(u.email);
      const adminBadge = isPostAdmin ? '<span class="admin-badge">👑 Admin</span>' : '';
      return `<div class="post"><div class="post-hdr"><div class="av">${(u.name||'?')[0].toUpperCase()}</div><div><div class="pn">${u.name}${adminBadge}</div><div class="ph">${u.bio||''}</div></div></div></div>`;
    }).join('') || '<div class="ctr">-</div>';
  });
}

function renderNotifs(m){m.innerHTML='<div class="ctr">'+t('noNotifs')+'</div>'}

function renderProfile(m){
  db.collection('users').doc(user.uid).get().then(doc=>{
    const u = doc.data()||{};
    const admin = isAdmin(user.email);
    const following = (u.following||[]).length;
    const followers = (u.followers||[]).length;
    m.innerHTML = `
      <div style="padding:20px;text-align:center">
        <div class="av av-lg" style="margin:0 auto 12px">${(u.name||user.email[0]).toUpperCase()}</div>
        <h2>${u.name||user.email} ${admin ? '<span class="admin-badge">👑 Admin</span>' : ''}</h2>
        <p style="color:#999;margin:8px 0">${u.bio||t('bio')}</p>
        <div style="display:flex;justify-content:center;gap:20px;margin:16px 0;color:#999;font-size:13px">
          <span><b style="color:#fff">${followers}</b> ${t('followers')}</span>
          <span><b style="color:#fff">${following}</b> ${t('following')}</span>
        </div>
        <div style="margin:20px 0">
          <input class="inp" id="newName" placeholder="Name" value="${u.name||''}">
          <textarea class="inp" id="newBio" placeholder="${t('bio')}">${u.bio||''}</textarea>
          <button class="btn" onclick="saveProfile()" style="width:100%">${t('save')}</button>
        </div>
        <button class="btn btn-o" onclick="logout()" style="width:100%">${t('logout')}</button>
      </div>`;
  });
}

function saveProfile(){
  const name = document.getElementById('newName').value;
  const bio = document.getElementById('newBio').value;
  db.collection('users').doc(user.uid).set({name,bio},{merge:true}).then(()=>{alert('Saved!'); render();});
}
</script>
</body>
</html>
