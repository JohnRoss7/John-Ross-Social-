
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>John Ross Social</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="dark-theme">

    <!-- Auth View -->
    <div id="auth-view" class="view">
        <div class="auth-container">
            <h1>John Ross Social</h1>
            <form id="login-form">
                <input type="email" id="email" placeholder="Email" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit" class="btn-primary">Login</button>
            </form>
            <button id="google-signin" class="btn-google">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_Logo.svg" alt="G"> Sign in with Google
            </button>
            <p>New here? <a href="#" id="toggle-auth">Register</a></p>
        </div>
    </div>

    <!-- Main App View (Hidden until Login) -->
    <div id="main-view" class="view hidden">
        <nav class="bottom-nav">
            <button onclick="showSection('feed')"><i class="fas fa-home"></i></button>
            <button onclick="showSection('profile')"><i class="fas fa-user"></i></button>
            <button id="logout-btn"><i class="fas fa-sign-out-alt"></i></button>
        </nav>

        <!-- Home Feed -->
        <section id="feed-section" class="content-section">
            <header class="app-header">Home</header>
            <div id="posts-container">
                <!-- Sample Posts injected by JS -->
            </div>
        </section>

        <!-- Profile Page -->
        <section id="profile-section" class="content-section hidden">
            <div class="profile-header">
                <div class="banner" style="background-image: url('https://images.unsplash.com/photo-1557683316-973673baf926?w=800');"></div>
                <div class="profile-info">
                    <img id="user-avatar" class="avatar-square" src="https://via.placeholder.com/150" alt="Profile">
                    <div class="info-text">
                        <h2 id="display-name">Username</h2>
                        <p id="user-bio">This is a sample bio. Building the next big social network.</p>
                        <button class="btn-follow">Follow</button>
                    </div>
                </div>
            </div>
            <div class="profile-tabs">
                <span>Posts</span>
                <span>Media</span>
                <span>Likes</span>
            </div>
        </section>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
